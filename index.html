<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>我們的片單 1.1.1</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="我們的片單">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">

    <style>
        :root {
            --ios-blue: #007aff;
            --ios-bg: #f2f2f7;
            --ios-card: #ffffff;
            --ios-gray: #8e8e93;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--ios-bg);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .app-container {
            width: 100%;
            max-width: 400px;
            background: var(--ios-card);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            box-sizing: border-box;
            margin-top: 20px;
        }
        h1 { font-size: 22px; text-align: center; margin-bottom: 5px; }
        .version { font-size: 12px; color: var(--ios-gray); text-align: center; margin-bottom: 20px; }
        
        .section {
            border: 1px solid #e5e5ea;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            background: #fafafa;
        }
        .section-title { font-weight: bold; margin-bottom: 10px; color: #333; font-size: 15px;}
        
        select, input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #d1d1d6;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
        }
        
        button {
            width: 100%;
            background-color: var(--ios-blue);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 5px;
        }
        button:active { opacity: 0.7; }
        .btn-query { background-color: #34c759; }
        .btn-update { background-color: #ff9500; }
    </style>
</head>
<body>

<div class="app-container">
    <h1>🎬 我們的片單</h1>
    <div class="version">v1.1.1 (Notion API 網頁版)</div>

    <div class="section">
        <div class="section-title">📌 功能一：新增播放清單</div>
        <input type="text" id="add-title" placeholder="請輸入片名">
        
        <select id="add-country">
            <option value="台">台</option><option value="陸">陸</option>
            <option value="港">港</option><option value="日韓">日韓</option>
            <option value="東南亞">東南亞</option><option value="洋">洋</option>
        </select>
        
        <select id="add-type">
            <option value="電影">電影</option><option value="劇">劇</option>
            <option value="卡通/動漫">卡通/動漫</option>
        </select>
        
        <select id="add-status" onchange="toggleEpisodeInput()">
            <option value="看完">看完</option>
            <option value="沒看" selected>沒看</option>
            <option value="進行中">進行中</option>
        </select>
        
        <input type="text" id="add-episode" placeholder="第幾集？ (選進行中才需填寫)" style="display:none;">
        
        <button onclick="addNotionPage()">確認新增至 Notion</button>
    </div>

    <div class="section">
        <div class="section-title">🔍 功能二：查詢進度 / 連結</div>
        <button class="btn-query" onclick="queryNotionPage()">點擊查詢當前所有片單</button>
    </div>

    <div class="section">
        <div class="section-title">🔄 功能三：更新影片進度</div>
        <input type="text" id="update-title" placeholder="請輸入要更新的精確片名">
        <select id="update-status">
            <option value="看完">看完</option>
            <option value="沒看">沒看</option>
            <option value="進行中" selected>進行中</option>
        </select>
        <input type="text" id="update-remark" placeholder="請輸入進度備註 (非進行中則留空)">
        <button class="btn-update" onclick="updateNotionPage()">確認更新進度</button>
    </div>
</div>

<script>
    // ==========================================
    // 🔑 核心金鑰設定 (對應影片最上方的兩個文字方塊)
    // ==========================================
    const NOTION_TOKEN = "ntn_L9770114129m3ksv591SlklfxyrPtADOYVZAXjHNj3d6B";
    const DATABASE_ID = "28f24658292482948024956ad461602eb939";

    // 公用 Header 設定，Notion 要求標準的 API 版本與驗證
    const headers = {
        "Authorization": `Bearer ${NOTION_TOKEN}`,
        "Notion-Version": "2022-06-28",
        "Content-Type": "application/json"
    };

    // UI 控制：當狀態選擇「進行中」時，才顯示「第幾集」輸入框
    function toggleEpisodeInput() {
        const status = document.getElementById('add-status').value;
        document.getElementById('add-episode').style.display = (status === '進行中') ? 'block' : 'none';
    }

    // ==========================================
    // 🛠️ 功能一：新增播放清單 (POST https://api.notion.com/v1/pages)
    // ==========================================
    async function addNotionPage() {
        const title = document.getElementById('add-title').value.trim();
        const country = document.getElementById('add-country').value;
        const type = document.getElementById('add-type').value;
        const status = document.getElementById('add-status').value;
        let remark = "";

        if (!title) { alert("請填寫片名！"); return; }
        
        // 捷徑邏輯：如果是進行中，詢問第幾集並存入備註；其餘為空字元
        if (status === "進行中") {
            const ep = document.getElementById('add-episode').value.trim();
            remark = ep ? `第${ep}集` : "進行中";
        }

        // 對應影片 0:08 秒處的 JSON 結構
        const payload = {
            "parent": { "database_id": DATABASE_ID },
            "properties": {
                "片名": { "title": [{ "text": { "content": title } }] },
                "國家": { "select": { "name": country } },
                "影片類型": { "select": { "name": type } },
                "進度": { "status": { "name": status } },
                "備註": { "rich_text": [{ "text": { "content": remark } }] }
            }
        };

        try {
            // 發送發布請求
            const response = await fetch(`https://api.notion.com/v1/pages`, {
                method: "POST",
                headers: headers,
                body: JSON.stringify(payload)
            });
            
            if (response.ok) {
                alert(`新增成功！\n新增了 ${title} 並將 國家設為 ${country} 影片類型設為 ${type} 進度為 ${status} 備註為 ${remark}`);
                document.getElementById('add-title').value = ""; // 清空
            } else {
                const errData = await response.json();
                alert(`錯誤：${errData.message}`);
            }
        } catch (error) {
            alert(`網路錯誤，無法連線到 Notion: ${error}`);
        }
    }

    // ==========================================
    // 🛠️ 功能二：查詢進度 / 連結 (POST .../databases/{id}/query)
    // ==========================================
    async function queryNotionPage() {
        try {
            // 對應影片 0:13 秒：取得資料庫內容
            const response = await fetch(`https://api.notion.com/v1/databases/${DATABASE_ID}/query`, {
                method: "POST",
                headers: headers
            });
            
            if (!response.ok) throw new Error("無法獲取資料庫數據");
            
            const data = await response.json();
            const results = data.results; // 對應捷徑「在字典中取得 results」
            
            if (results.length === 0) { alert("目前資料庫沒有任何片單數據。"); return; }

            // 捷徑邏輯：重複循環處理每個項目，並萃取出片名與連結
            let listString = "📋 當前片單與連結：\n\n";
            let urlMap = {}; // 用來存片名對應的 Notion 網址

            results.forEach((item, index) => {
                // 對應捷徑解析 JSON 屬性 (properties -> 片名 -> title -> text -> content)
                const properties = item.properties;
                const pageUrl = item.url; // 取得每個項目的 notion 頁面連結
                
                let titleText = "未命名";
                if(properties["片名"] && properties["片名"].title.length > 0) {
                    titleText = properties["片名"].title[0].plain_text;
                }

                listString += `${index + 1}. ${titleText}\n`;
                urlMap[index + 1] = { name: titleText, url: pageUrl };
            });

            // 捷徑 0:17 秒邏輯：彈出選單讓使用者選擇
            let choice = prompt(`${listString}\n請輸入數字 (例如 1) 來打開該影片的 Notion 連結，或按取消：`);
            
            if (choice && urlMap[choice]) {
                // 開啟捷徑連結
                window.open(urlMap[choice].url, '_blank');
            }
        } catch (error) {
            alert(`查詢失敗：${error}`);
        }
    }

    // ==========================================
    // 🛠️ 功能三：更新進度 (大約影片 0:20 秒處)
    // ==========================================
    async function updateNotionPage() {
        const targetTitle = document.getElementById('update-title').value.trim();
        const newStatus = document.getElementById('update-status').value;
        let newRemark = document.getElementById('update-remark').value.trim();

        if (!targetTitle) { alert("請輸入要更新的片名！"); return; }

        try {
            // 第一步：先去 Notion 搜尋這個片名，拿到它的 pageID
            const queryResponse = await fetch(`https://api.notion.com/v1/databases/${DATABASE_ID}/query`, {
                method: "POST",
                headers: headers,
                body: JSON.stringify({
                    "filter": {
                        "property": "片名",
                        "title": { "equals": targetTitle }
                    }
                })
            });

            const queryData = await queryResponse.json();
            if (queryData.results.length === 0) {
                alert(`找不到名為「${targetTitle}」的影片，請確認名稱是否完全正確。`);
                return;
            }

            // 抓到目標頁面的 ID (捷徑中的 pageID)
            const pageId = queryData.results[0].id;

            // 捷徑邏輯 (影片 0:23)：如果進度選擇不是進行中，備註設為空字元
            if (newStatus !== "進行中") {
                newRemark = "";
            }

            // 對應影片 0:24 秒：更新頁面的 JSON 結構 (PATCH https://api.notion.com/v1/pages/{page_id})
            const updatePayload = {
                "properties": {
                    "進度": { "status": { "name": newStatus } },
                    "備註": { "rich_text": [{ "text": { "content": newRemark } }] }
                }
            };

            const response = await fetch(`https://api.notion.com/v1/pages/${pageId}`, {
                method: "PATCH",
                headers: headers,
                body: JSON.stringify(updatePayload)
            });

            if (response.ok) {
                // 對應影片最後一幕的 PrintShow 提示
                alert(`將 [ ${targetTitle} ]\n進度改為：${newStatus}\n備註：${newRemark || '無'}\n已更新成功！`);
                document.getElementById('update-title').value = "";
                document.getElementById('update-remark').value = "";
            } else {
                alert("更新失敗，請檢查 Notion API 狀態。");
            }

        } catch (error) {
            alert(`更新時發生錯誤：${error}`);
        }
    }
</script>

</body>
</html>
