<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>JS 捷徑轉換器</title>

    <!-- iOS PWA 核心設定 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="JS捷徑">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">

    <style>
        :root {
            --ios-blue: #007aff;
            --ios-bg: #f2f2f7;
            --ios-card: #ffffff;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--ios-bg);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            user-select: none;
            -webkit-user-select: none;
        }

        .app-container {
            width: 100%;
            max-width: 350px;
            background: var(--ios-card);
            border-radius: 20px;
            padding: 30px 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
        }

        h1 {
            font-size: 24px;
            color: #000;
            margin-bottom: 10px;
        }

        p {
            font-size: 14px;
            color: #8e8e93;
            margin-bottom: 30px;
        }

        .ios-btn {
            background-color: var(--ios-blue);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            box-sizing: border-box;
            cursor: pointer;
            transition: opacity 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .ios-btn:active {
            opacity: 0.7;
        }

        /* 提示引導（僅在瀏覽器內顯示，加入主畫面後隱藏） */
        @media (display-mode: standalone) {
            .safari-tip { display: none; }
        }
        .safari-tip {
            margin-top: 20px;
            font-size: 13px;
            color: #ff9500;
            background: #fff9e6;
            padding: 10px;
            border-radius: 10px;
            width: 100%;
            max-width: 330px;
            box-sizing: border-box;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>JS 捷徑自動化</h1>
        <p>點擊下方按鈕觸發轉換後的捷徑動作</p>
        
        <!-- 點擊觸發 JS 捷徑 -->
        <button class="ios-btn" onclick="runShortcut()">執行我的捷徑</button>
    </div>

    <div class="safari-tip">
        💡 <b>請用 Safari 開啟</b>，點擊下方「分享」按鈕，選擇<b>「加入主畫面」</b>以獲得完整 App 體驗！
    </div>

    <script>
        // 註冊 Service Worker 讓 App 可以離線運作
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('Service Worker 註冊成功'))
                .catch(err => console.log('Service Worker 註冊失敗', err));
        }

        // 捷徑功能邏輯
        function runShortcut() {
            let name = prompt("請輸入您的名字：");
            if (name === null) return; // 使用者按取消
            if (name.trim() === "") name = "訪客";
            
            const now = new Date();
            const formattedDate = now.toLocaleString('zh-TW', { 
                year: 'numeric', 
                month: '2-digit', 
                day: '2-digit', 
                hour: '2-digit', 
                minute: '2-digit',
                second: '2-digit',
                hour12: false 
            });
            
            alert(`🎉 執行成功！\n\n${name}，現在時間是：\n${formattedDate}`);
        }
    </script>
</body>
</html>
